<!DOCTYPE html>
<html lang="pt">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/svg+xml" href="%PUBLIC_URL%/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#16a34a" />
    <meta
      name="description"
      content="Oi eu sou o Victor Andrade, sou desenvolvedor frontend no Grupo GFT, seja bem-vindo ao meu site e portfólio pessoal."
    />

    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>Victor Andrade</title>

    <script>
      // Pick theme before paint: localStorage override → system preference → light
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          var prefersDark = window.matchMedia &&
            window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme = stored || (prefersDark ? 'dark' : 'light');
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>

    <link rel="stylesheet" href="//cdn.rawgit.com/konpa/devicon/df6431e323547add1b4cf45992913f15286456d3/devicon.min.css">

  </head>
